<!DOCTYPE HTML>
<html lang="pt-br">
    <head>
        <title>Formulário</title> <!--V -->
        <meta charset="UTF-8">
    </head> <!--V -->
    <body>
        <h1>Cadastro de Usuarío</h1> <!--V -->
        <form action="index.html" method="post"> <!--V -->
            <label for= "nome" >Nome:</label>
            <input type="text" id="nome" name="nome"><!-- X -->
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email"><!--V -->
            <br>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha"><!--V -->
            <br>
            <label for="nascimento">Idade:</label><!--X -->
            <input type="number" id="nascimento" name="idade"><!--V -->
            <br>
            <label for="data">Data de nascimento:</label>
            <input type="date" id="data" name="data">
            <br>
            <p>Turno:</p>
            <input type ="radio" name="turno" id="manha"><label for="manha">Manha</label>
            <input type ="radio" name="turno" id="tarde"><label for="tarde">Tarde</label><!--V --><!--X -->
            <input type ="radio" name="turno" id="noite"><label for="noite">Noite</label>
            <br>
            <p>Àreas de interesse:</p>
            <input type="checkbox" name="area" id="progamaçao"><label for="progamaçao">Programação</label>
            <input type="checkbox" name="area" id="desing"><label for="desing">Desing</label>
            <input type="checkbox" name="area" id="redes"><label for="redes">Redes</label><!--V -->
            <br>
            <input type="submit" value="Enviar"><!--V -->
            <input type="reset" value="Limpar"><!--V -->
        </form>
    </body>
</html>
