<!DOCTYPE HTML>
<html lang="pt-br">
    <head>
        <title>Formulário</title>
        <meta charset="UTF-8">
    </head>
    <body>
        <h1>Cadastro de Usuarío</h1>
        <form action="index.html" method="post">
            <label for= "nome" >Nome:</label>
            <input type="text" id="nome">
            <br>
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email">
            <br>
            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha">
            <br>
            <label for="idade">Idade:</label>
            <input type="number" id="idade" name="idade">
            <br>
            <label for="data">Data de nascimento:</label>
            <input type="date" id="data" name="data">
            <br>
            <p>Turno:</p>
            <input type ="radio" name="turnomanha" id="manha"><label for="manha">Manha</label>
            <input type ="radio" name="turnotarde" id="tarde"><label for="tarde">Tarde</label>
            <input type ="radio" name="turnonoite" id="noite"><label for="noite">Noite</label>
            <br>
            <p>Àreas de interesse:</p>
            <input type="checkbox" name="areaprog" id="progamaçao"><label for="progamaçao">Programação</label>
            <input type="checkbox" name="areadesing" id="desing"><label for="desing">Desing</label>
            <input type="checkbox" name="arearedes" id="redes"><label for="redes">Redes</label>
            <br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </form>
    </body>
</html>
