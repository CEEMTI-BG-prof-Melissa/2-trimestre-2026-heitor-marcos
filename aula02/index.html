<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Controles de formulario</title>
    </head>
    <body>
        <h1>Preferências</h1>
        <form action="index.html" method="get">
            Nome:<input type="text" name="nome" id="nome"><br>
            <p>Qual turno você prefere estudar?</p>
            <input type="radio" name="turno" id="manha"><label for="manha">Manhã</label><br>
            <input type="radio" name="turno" id="tarde"><label for="tarde">Tarde</label><br>
            <input type="radio" name="turno" id="noite"><label for="noite">Noite</label><br>
            <p>Quais areas você tem interesse?</p>
            <input type="checkbox" name="area" id="progamação"><label for="progamação">Progamação</label><br>
            <input type="checkbox" name="area" id="desing"><label for="desing">Desing</label><br>
            <input type="checkbox" name="area" id="bd"><label for="bd">Banco de Dados</label><br>
            <input type="checkbox" name="area" id="redes"><label for="redes">redes</label><br>
            <label for="cor">Qual sua cor Favorita? </label><input type="color" name="color" id="cor"><br><br>
            <label for="sas">Qual seu nivel de Sastifação? </label><input type="range" name="sas" id="sas"><br><br>
            <label for="tempo">Qual seu horario preferido? </label><input type="time" name="tempo" id="tempo"><br><br>
            Envie um arquivo <input type="file" name="archive" id="arq"><br><br>
            <input type="submit" name="enviar" value="enviar">
            <input type="reset" name="limpar" value="limpar"><br>
        </form>
    </body>
</html>
